<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheGame</title>

<style>

/* =====================
   BASIC
===================== */
body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
font-family:Arial;
margin:0;
}

/* =====================
   HEADER
===================== */
.header{
background:#111;
padding:15px;
text-align:center;
font-size:28px;
color:#ff6b6b;
box-shadow:0 0 10px #000;
}

/* =====================
   BUTTON BAR
===================== */
.filter-bar{
text-align:center;
padding:15px;
}

.filter-btn{
margin:5px;
padding:10px 18px;
background:#1a1a1a;
border:1px solid #333;
color:white;
cursor:pointer;
border-radius:8px;
transition:0.2s;
}

.filter-btn:hover{
background:#ff6b6b;
transform:scale(1.05);
}

/* =====================
   GRID
===================== */
.games-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* =====================
   CARD
===================== */
.game-card{
background:#1a1a1a;
padding:15px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px #000;
}

.game-card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px #ff6b6b;
}

.game-image{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

/* =====================
   MODAL (SPIEL + CHAT)
===================== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

.modal-content{
width:90%;
height:90%;
margin:auto;
margin-top:2%;
background:#111;
border-radius:10px;
padding:10px;
position:relative;
}

.close-btn{
position:absolute;
right:10px;
top:10px;
background:red;
border:none;
color:white;
padding:10px;
cursor:pointer;
}

/* =====================
   CHAT
===================== */
#chatBox{
height:80%;
overflow:auto;
border:1px solid #333;
padding:10px;
margin-bottom:10px;
}

.chat-input{
width:70%;
padding:10px;
}

</style>
</head>

<body>

<div class="header">🎮 TheGame</div>

<!-- =====================
     BUTTONS
===================== -->
<div class="filter-bar">

<button class="filter-btn" onclick="filterGames('all')">Alle</button>
<button class="filter-btn" onclick="filterGames('racing')">Racing</button>
<button class="filter-btn" onclick="filterGames('action')">Action</button>

<button class="filter-btn" onclick="openChat()">🤖 Chatbot</button>
<button class="filter-btn" onclick="openChatGPT()">💬 ChatGPT</button>

</div>

<!-- =====================
     SPIELE
===================== -->
<div id="gamesContainer" class="games-grid"></div>

<!-- =====================
     MODAL (SPIELE + CHAT)
===================== -->
<div id="modal" class="modal">
<div class="modal-content">

<button class="close-btn" onclick="closeModal()">X</button>

<div id="modalContent" style="width:100%;height:100%;"></div>

</div>
</div>

<script>

// =====================
// SPIELE
// =====================
const games = [

{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},

{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},

{title:"SpacePinball",category:"racing",url:"https://cdn.htmlgames.com/SpacePinball/",image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png?w=128"}

];

// =====================
// SPIELE LADEN
// =====================
function loadGames(list){
const container = document.getElementById("gamesContainer");
container.innerHTML = "";

list.forEach(game => {

const div = document.createElement("div");
div.className = "game-card";

div.innerHTML = `
<img src="${game.image}" class="game-image">
<h3>${game.title}</h3>
`;

div.onclick = () => openGame(game.url);

container.appendChild(div);
});
}

// =====================
// SPIEL ÖFFNEN
// =====================
function openGame(url){
document.getElementById("modal").style.display = "block";

document.getElementById("modalContent").innerHTML = `
<iframe src="${url}" width="100%" height="100%"></iframe>
`;
}

// =====================
// CHAT ÖFFNEN (JETZT WIE SPIEL!)
// =====================
function openChat(){
document.getElementById("modal").style.display = "block";

document.getElementById("modalContent").innerHTML = `
<h2>🤖 Chatbot</h2>

<div id="chatBox"></div>

<input id="chatInput" class="chat-input" placeholder="Schreib etwas...">
<button onclick="sendMessage()">Senden</button>
`;
}

// =====================
// CHATGPT ÖFFNEN
// =====================
function openChatGPT(){
window.open("https://chat.openai.com","_blank");
}

// =====================
// MODAL SCHLIESSEN
// =====================
function closeModal(){
document.getElementById("modal").style.display = "none";
document.getElementById("modalContent").innerHTML = "";
}

// =====================
// FILTER
// =====================
function filterGames(category){

if(category === "all"){
loadGames(games);
return;
}

const filtered = games.filter(g => g.category === category);
loadGames(filtered);
}

// =====================
// CHATBOT
// =====================
function sendMessage(){

const input = document.getElementById("chatInput");
const box = document.getElementById("chatBox");

const text = input.value.toLowerCase();

box.innerHTML += `<p>Du: ${text}</p>`;

let reply = "Keine Ahnung 😅";

if(text.includes("hallo")){
reply = "Hallo 👋";
}
else if(text.includes("beliebtestes")){
reply = "Traffic Racer 2 🚗";
}
else if(text.includes("wem gehört")){
reply = "Die Seite gehört Alessio 😎";
}
else if(text.includes("nicht beliebt")){
reply = "SpacePinball 😅";
}

box.innerHTML += `<p>Bot: ${reply}</p>`;

input.value = "";
box.scrollTop = box.scrollHeight;
}

// =====================
loadGames(games);
// =====================

</script>

</body>
</html>
