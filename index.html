<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheGame</title>

<style>

/* ===================== */
/* BASIC */
/* ===================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
color:white;
font-family:Arial;
}

/* ===================== */
/* HEADER */
/* ===================== */

.header{
background:linear-gradient(90deg,#111,#1f1f1f);
padding:15px;
text-align:center;
font-size:28px;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

/* ===================== */
/* FILTER BUTTONS */
/* ===================== */

.filter{
text-align:center;
margin:20px;
}

.filter button{
padding:10px 15px;
margin:5px;
background:#111;
border:1px solid #00ffcc;
color:#00ffcc;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.filter button:hover{
background:#00ffcc;
color:black;
}

/* ===================== */
/* GRID */
/* ===================== */

.games-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* ===================== */
/* CARD */
/* ===================== */

.game-card{
background:#111;
border-radius:15px;
padding:10px;
box-shadow:0 0 10px #000;
transition:0.3s;
cursor:pointer;
}

.game-card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffcc;
}

.game-image{
width:100%;
height:140px;
border-radius:10px;
object-fit:cover;
}

/* ===================== */
/* MODAL */
/* ===================== */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
}

.modal-content{
width:90%;
height:90%;
margin:auto;
margin-top:2%;
background:#000;
border-radius:10px;
position:relative;
}

.close-btn{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

/* ===================== */
/* CHATBOT */
/* ===================== */

.chat-box{
padding:10px;
height:80%;
overflow-y:auto;
}

.chat-input{
width:100%;
padding:10px;
border:none;
}

</style>
</head>

<body>

<!-- ===================== -->
<!-- HEADER -->
<!-- ===================== -->

<div class="header">🎮 TheGame</div>

<!-- ===================== -->
<!-- FILTER -->
<!-- ===================== -->

<div class="filter">
<button onclick="filterGames('all')">Alle</button>
<button onclick="filterGames('racing')">Racing</button>
<button onclick="filterGames('action')">Action</button>
<button onclick="openChatGPT()">ChatGPT</button>
<button onclick="openBot()">Mein Chatbot</button>
</div>

<!-- ===================== -->
<!-- GRID -->
<!-- ===================== -->

<div id="gamesContainer" class="games-grid"></div>

<!-- ===================== -->
<!-- MODAL -->
<!-- ===================== -->

<div id="modal" class="modal">
<div class="modal-content">
<button class="close-btn" onclick="closeModal()">X</button>
<div id="modalContent" style="width:100%;height:100%;"></div>
</div>
</div>

<script>

// =====================
// SPIELE
// =====================

const games = [

{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},

{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},

{title:"SpacePinball",category:"racing",url:"https://cdn.htmlgames.com/SpacePinball/",image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png"}

];

// =====================
// SPIELE LADEN
// =====================

function loadGames(list){
const container = document.getElementById("gamesContainer");
container.innerHTML = "";

list.forEach(game => {

const div = document.createElement("div");
div.className = "game-card";

div.innerHTML = `
<img src="${game.image}" class="game-image">
<h3>${game.title}</h3>
`;

div.onclick = () => openGame(game.url);

container.appendChild(div);

});
}

// =====================
// FILTER
// =====================

function filterGames(category){

if(category === "all"){
loadGames(games);
}else{
const filtered = games.filter(g => g.category === category);
loadGames(filtered);
}

}

// =====================
// GAME ÖFFNEN
// =====================

function openGame(url){
document.getElementById("modal").style.display = "block";
document.getElementById("modalContent").innerHTML = `
<iframe src="${url}" width="100%" height="100%"></iframe>
`;
}

// =====================
// CHATGPT ÖFFNEN
// =====================

function openChatGPT(){
document.getElementById("modal").style.display = "block";
document.getElementById("modalContent").innerHTML = `
<iframe src="https://chat.openai.com" width="100%" height="100%"></iframe>
`;
}

// =====================
// CHATBOT ÖFFNEN
// =====================

function openBot(){
document.getElementById("modal").style.display = "block";

document.getElementById("modalContent").innerHTML = `
<div class="chat-box" id="chatBox"></div>
<input class="chat-input" placeholder="Schreib etwas..." onkeydown="sendMessage(event)">
`;
}

// =====================
// CHATBOT LOGIK
// =====================

function sendMessage(e){
if(e.key !== "Enter") return;

const input = e.target;
const text = input.value.toLowerCase();
const box = document.getElementById("chatBox");

box.innerHTML += `<p><b>Du:</b> ${text}</p>`;

let answer = "Das weiß ich nicht 😅";

// Befehle
if(text.includes("hallo")) answer = "Hey 👋";
if(text.includes("beliebteste")) answer = "Traffic Racer 2 ist sehr beliebt 🚗";
if(text.includes("wem gehört")) answer = "Die Website gehört Alessio 😎";
if(text.includes("nicht beliebt")) answer = "SpacePinball ist weniger gespielt 🎯";

box.innerHTML += `<p><b>Bot:</b> ${answer}</p>`;

input.value = "";
box.scrollTop = box.scrollHeight;
}

// =====================
// MODAL SCHLIESSEN
// =====================

function closeModal(){
document.getElementById("modal").style.display = "none";
document.getElementById("modalContent").innerHTML = "";
}

// =====================
// START
// =====================

loadGames(games);

</script>

</body>
</html>
