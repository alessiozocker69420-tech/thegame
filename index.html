<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>🔥 Gaming Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  background: #020617;
  border-bottom: 2px solid #0ea5e9;
}

.buttons {
  text-align: center;
  margin: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #0ea5e9;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #0284c7;
}

.games {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #020617;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
  text-align: center;
}

/* Fenster */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 80%;
  height: 80%;
  transform: translate(-50%,-50%);
  background: black;
  display: none;
  border: 3px solid #0ea5e9;
  border-radius: 10px;
  z-index: 999;
}

.popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 25px;
  cursor: pointer;
  color: red;
}

</style>
</head>

<body>

<header>🎮 Gaming Hub Pro</header>

<div class="buttons">
  <!-- SORTIERUNG -->
  <button onclick="filterGames('all')">Alle</button>
  <button onclick="filterGames('racing')">Racing</button>
  <button onclick="filterGames('action')">Action</button>

  <!-- CHATGPT -->
  <button onclick="openChatGPT()">ChatGPT</button>

  <!-- MYINSTANTS -->
  <button onclick="openMyinstants()">Sounds</button>
</div>

<div class="games" id="games"></div>

<!-- SPIEL POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="closePopup()">❌</span>
  <iframe id="frame"></iframe>
</div>

<!-- MYINSTANTS POPUP -->
<div class="popup" id="soundPopup">
  <span class="close" onclick="closeSound()">❌</span>
  <iframe src="https://www.myinstants.com"></iframe>
</div>

<script>

// SPIELE
const games = [
{title:"Ultimate Car Driving Simulator",category:"racing",url:"https://www.madkidgames.com/full/ultimate-car-driving-simulator"},
{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/"},
{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/"},
{title:"SpacePinball",category:"racing",url:"https://cdn.htmlgames.com/SpacePinball/"},
{title:"Higher or Lower",category:"racing",url:"https://cdn.htmlgames.com/HigherOrLower/"},
{title:"City Sniper",category:"action",url:"https://cdn.htmlgames.com/CitySniper/"},
{title:"Thief Puzzle",category:"racing",url:"https://play.famobi.com/thief-puzzle"},
{title:"Geometry Dash",category:"racing",url:"https://gdbrowser.com"},
{title:"Galaxy Shooter",category:"racing",url:"https://cdn.htmlgames.com/GalaxyShooter/"}
];

// SPIELE LADEN
function loadGames(list) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  list.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${game.title}</h3>`;
    div.onclick = () => openGame(game.url);
    container.appendChild(div);
  });
}

// SPIEL ÖFFNEN
function openGame(url){
  document.getElementById("popup").style.display="block";
  document.getElementById("frame").src=url;
}

// SPIEL SCHLIESSEN
function closePopup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("frame").src="";
}

// SORTIERUNG
function filterGames(cat){
  if(cat==="all"){
    loadGames(games);
  } else {
    loadGames(games.filter(g=>g.category===cat));
  }
}

// CHATGPT
function openChatGPT(){
  window.open("https://chat.openai.com","_blank");
}

// MYINSTANTS
function openMyinstants(){
  document.getElementById("soundPopup").style.display="block";
}

function closeSound(){
  document.getElementById("soundPopup").style.display="none";
}

// START
loadGames(games);

</script>

</body>
</html>
