<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheGame</title>

<style>

/* =====================
   BASIC
===================== */
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

/* =====================
   HEADER
===================== */
.header{
background:#1a1a1a;
padding:15px;
text-align:center;
font-size:24px;
color:#ff6b6b;
}

/* =====================
   BUTTONS
===================== */
.filter-bar{
text-align:center;
margin:20px;
}

.filter-btn{
margin:5px;
padding:10px 15px;
background:#1a1a1a;
border:1px solid #333;
color:white;
cursor:pointer;
border-radius:5px;
}

.filter-btn:hover{
background:#ff6b6b;
}

/* =====================
   GRID
===================== */
.games-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* =====================
   CARD
===================== */
.game-card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.game-image{
width:100%;
height:140px;
object-fit:cover;
}

/* =====================
   CHAT
===================== */
.chat-container{
display:none;
max-width:600px;
margin:20px auto;
background:#1a1a1a;
padding:20px;
}

</style>
</head>

<body>

<div class="header">🎮 TheGame</div>

<!-- =====================
     BUTTONS
===================== -->
<div class="filter-bar">

<button class="filter-btn" onclick="filterGames('all')">Alle</button>
<button class="filter-btn" onclick="filterGames('racing')">Racing</button>
<button class="filter-btn" onclick="filterGames('action')">Action</button>

<!-- 🔥 NEU -->
<button class="filter-btn" onclick="openChatGPT()">ChatGPT</button>
<button class="filter-btn" onclick="showChat()">Mein Chatbot</button>

</div>

<!-- =====================
     SPIELE
===================== -->
<div id="gamesContainer" class="games-grid"></div>

<!-- =====================
     CHATBOT
===================== -->
<div id="chatSection" class="chat-container">

<h2>🤖 Mein Chatbot</h2>

<div id="chatBox" style="height:200px;overflow:auto;border:1px solid #333;"></div>

<input id="chatInput" placeholder="Schreib etwas...">
<button onclick="sendMessage()">Senden</button>

</div>

<script>

// =====================
// SPIELE
// =====================
const games = [

{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},

{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},

{title:"SpacePinball",category:"racing",url:"https://cdn.htmlgames.com/SpacePinball/",image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png?w=128"}

];

// =====================
// SPIELE LADEN
// =====================
function loadGames(list){
const container = document.getElementById("gamesContainer");
container.innerHTML = "";

list.forEach(game => {
const div = document.createElement("div");
div.className = "game-card";

div.innerHTML = `
<img src="${game.image}" class="game-image">
<h3>${game.title}</h3>
`;

div.onclick = () => window.open(game.url);

container.appendChild(div);
});
}

// =====================
// FILTER
// =====================
function filterGames(category){

if(category === "all"){
loadGames(games);
return;
}

const filtered = games.filter(g => g.category === category);
loadGames(filtered);
}

// =====================
// CHATGPT ÖFFNEN
// =====================
function openChatGPT(){
window.open("https://chat.openai.com", "_blank");
}

// =====================
// CHAT ANZEIGEN
// =====================
function showChat(){
document.getElementById("chatSection").style.display = "block";
window.scrollTo(0, document.body.scrollHeight);
}

// =====================
// CHATBOT
// =====================
function sendMessage(){

const input = document.getElementById("chatInput");
const box = document.getElementById("chatBox");

const text = input.value.toLowerCase();

box.innerHTML += `<p>Du: ${text}</p>`;

let reply = "Keine Ahnung 😅";

if(text.includes("hallo")){
reply = "Hallo 👋";
}
else if(text.includes("beliebtestes")){
reply = "Traffic Racer 2 🚗";
}
else if(text.includes("wem gehört")){
reply = "Die Seite gehört Alessio 😎";
}
else if(text.includes("nicht beliebt")){
reply = "SpacePinball 😅";
}

box.innerHTML += `<p>Bot: ${reply}</p>`;

input.value = "";
box.scrollTop = box.scrollHeight;
}

// =====================
loadGames(games);
// =====================

</script>

</body>
</html>
