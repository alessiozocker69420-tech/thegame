<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Gaming Seite</title>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  font-family: Arial;
  text-align: center;
}

/* Spiele */
.game {
  display: inline-block;
  margin: 10px;
  padding: 10px;
  background: #1e293b;
  border-radius: 12px;
  cursor: pointer;
  width: 180px;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
  background: #334155;
}

.game img {
  width: 100%;
  border-radius: 10px;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 12px 25px;
  font-size: 16px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* Sound Menü */
#soundMenu {
  display: none;
}

.soundBtn {
  display: block;
  margin: 8px auto;
  padding: 10px;
  width: 200px;
  background: #334155;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>🎮 Meine Gaming Seite</h1>

<!-- BUTTONS -->
<button class="btn" onclick="openChatGPT()">🤖 ChatGPT</button>
<button class="btn" onclick="toggleSounds()">🔊 Sounds</button>

<!-- SOUND MENU -->
<div id="soundMenu">
  <button class="soundBtn" onclick="playSound('s1')">🔥 Sound 1</button>
  <button class="soundBtn" onclick="playSound('s2')">😂 Sound 2</button>
  <button class="soundBtn" onclick="playSound('s3')">💥 Sound 3</button>
</div>

<!-- SPIELE -->
<div id="games"></div>

<!-- AUDIO -->
<audio id="s1" src="sound1.mp3"></audio>
<audio id="s2" src="sound2.mp3"></audio>
<audio id="s3" src="sound3.mp3"></audio>

<script>

// 🤖 ChatGPT öffnen
function openChatGPT() {
  window.open("https://chat.openai.com", "_blank");
}

// 🔊 Sound Menü
function toggleSounds() {
  const menu = document.getElementById("soundMenu");
  menu.style.display = menu.style.display === "none" ? "block" : "none";
}

// 🔊 Sound abspielen
function playSound(id) {
  const s = document.getElementById(id);
  s.currentTime = 0;
  s.play();
}

// 🎮 ALLE DEINE SPIELE
const games = [

{title:"Ultimate Car Driving Simulator", url:"https://www.madkidgames.com/full/ultimate-car-driving-simulator", image:"https://via.placeholder.com/200"},
{title:"Airport Sniper", url:"https://cdn.htmlgames.com/AirportSniper/", image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},
{title:"Traffic Racer 2", url:"https://cdn.htmlgames.com/TrafficRacer2/", image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},
{title:"Space Pinball", url:"https://cdn.htmlgames.com/SpacePinball/", image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png"},
{title:"Higher or Lower", url:"https://cdn.htmlgames.com/HigherOrLower/", image:"https://www.denkspiele.com/uploaded/game/screenshot/higherorLower800480.webp"},
{title:"City Sniper", url:"https://cdn.htmlgames.com/CitySniper/", image:"https://www.sellmyapp.com/wp-content/uploads/featured_image63417aad1a69e.png"},
{title:"Thief Puzzle", url:"https://play.famobi.com/thief-puzzle", image:"https://via.placeholder.com/200"},
{title:"Geometry Dash", url:"https://gdbrowser.com", image:"https://via.placeholder.com/200"},
{title:"Galaxy Shooter", url:"https://cdn.htmlgames.com/GalaxyShooter/", image:"https://via.placeholder.com/200"}

];

// 🎮 anzeigen
const container = document.getElementById("games");

games.forEach(game => {
  const div = document.createElement("div");
  div.className = "game";

  div.innerHTML = `
    <img src="${game.image}">
    <h3>${game.title}</h3>
  `;

  div.onclick = () => {
    window.open(game.url, "_blank");
  };

  container.appendChild(div);
});

</script>

</body>
</html>
