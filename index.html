<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>the game</title>

<style>

/* ===== DESIGN ===== */
:root {
  --main:#00ffcc;
  --bg:#020617;
  --card:#111;
}

body {
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,var(--bg),black);
  color:white;
  text-align:center;
}

header {
  font-size:40px;
  padding:20px;
  background:linear-gradient(90deg,#00ffcc,#22c55e);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTONS */
.btn {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#111;
  color:var(--main);
  cursor:pointer;
}

/* GRID */
#games {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.game {
  width:200px;
  margin:10px;
  background:#111;
  border-radius:15px;
  cursor:pointer;
}

.game img {width:100%;}

/* ===== WINDOWS ===== */
.window {
  display:none;
  position:fixed;
  top:5%;
  left:5%;
  width:90%;
  height:85%;
  background:black;
  border:2px solid var(--main);
  border-radius:15px;
  z-index:999;
}

.window iframe {
  width:100%;
  height:100%;
  border:none;
}

/* CLOSE BUTTON */
.close {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  border:none;
  color:white;
  padding:8px;
  cursor:pointer;
}

/* CHAT */
#chat {
  display:none;
  position:fixed;
  bottom:0;
  right:0;
  width:300px;
  height:400px;
  background:black;
  border:2px solid var(--main);
  flex-direction:column;
}

#messages {flex:1; overflow:auto;}
.msg{padding:5px;}
.bot{color:#00ffcc;}

#input {display:flex;}
#input input{flex:1;padding:8px;}

</style>
</head>

<body>

<header>🎮 the game</header>

<div>
  <button class="btn" onclick="app.toggleChat()">🤖 KI</button>
  <button class="btn" onclick="app.openSounds()">🔊 Sounds</button>

  <!-- SORT -->
  <button class="btn" onclick="app.sortAZ()">A-Z</button>
  <button class="btn" onclick="app.sortZA()">Z-A</button>

  <br>
  <input id="search" placeholder="🔍 Suche...">
</div>

<div id="games"></div>

<!-- GAME WINDOW -->
<div id="gameWindow" class="window">
  <button class="close" onclick="app.closeGame()">❌</button>
  <iframe id="player"></iframe>
</div>

<!-- SOUNDS -->
<div id="soundWindow" class="window">
  <button class="close" onclick="app.closeSounds()">❌</button>
  <iframe src="https://www.myinstants.com"></iframe>
</div>

<!-- CHAT -->
<div id="chat">
  <button class="close" onclick="app.toggleChat()">❌</button>
  <div id="messages"></div>
  <div id="input">
    <input id="userInput">
    <button onclick="app.send()">➤</button>
  </div>
</div>

<script>

class App {

constructor(){
this.games=[

{title:"Ultimate Car Driving Simulator",url:"https://www.madkidgames.com/full/ultimate-car-driving-simulator",image:"https://via.placeholder.com/200"},
{title:"Airport Sniper",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},
{title:"Traffic Racer 2",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},
{title:"Space Pinball",url:"https://cdn.htmlgames.com/SpacePinball/",image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png"},
{title:"Higher or Lower",url:"https://cdn.htmlgames.com/HigherOrLower/",image:"https://www.denkspiele.com/uploaded/game/screenshot/higherorLower800480.webp"},
{title:"City Sniper",url:"https://cdn.htmlgames.com/CitySniper/",image:"https://www.sellmyapp.com/wp-content/uploads/featured_image63417aad1a69e.png"},
{title:"Thief Puzzle",url:"https://play.famobi.com/thief-puzzle",image:"https://via.placeholder.com/200"},
{title:"Geometry Dash",url:"https://gdbrowser.com",image:"https://via.placeholder.com/200"},
{title:"Galaxy Shooter",url:"https://cdn.htmlgames.com/GalaxyShooter/",image:"https://via.placeholder.com/200"}

];

this.render(this.games);

document.getElementById("search").addEventListener("input",e=>{
const val=e.target.value.toLowerCase();
this.render(this.games.filter(g=>g.title.toLowerCase().includes(val)));
});
}

/* RENDER */
render(list){
const c=document.getElementById("games");
c.innerHTML="";
list.forEach(g=>{
const div=document.createElement("div");
div.className="game";
div.innerHTML=`<img src="${g.image}"><h3>${g.title}</h3>`;
div.onclick=()=>this.openGame(g.url);
c.appendChild(div);
});
}

/* GAME */
openGame(url){
document.getElementById("gameWindow").style.display="block";
document.getElementById("player").src=url;
}

closeGame(){
document.getElementById("gameWindow").style.display="none";
}

/* SOUNDS */
openSounds(){
document.getElementById("soundWindow").style.display="block";
}

closeSounds(){
document.getElementById("soundWindow").style.display="none";
}

/* CHAT */
toggleChat(){
const c=document.getElementById("chat");
c.style.display=c.style.display==="flex"?"none":"flex";
}

send(){
const i=document.getElementById("userInput");
const t=i.value;
i.value="";
this.addMsg(t,"user");
this.addMsg(this.ai(t),"bot");
}

addMsg(t,type){
const m=document.createElement("div");
m.className="msg "+type;
m.innerText=t;
document.getElementById("messages").appendChild(m);
}

/* AI */
ai(t){
t=t.toLowerCase();
if(t.includes("+")||t.includes("-")){try{return eval(t)}catch{return "Fehler"}}
if(t.includes("hallo")) return "Hi 👋";
return "🤖 ...";
}

/* SORT */
sortAZ(){
this.games.sort((a,b)=>a.title.localeCompare(b.title));
this.render(this.games);
}

sortZA(){
this.games.sort((a,b)=>b.title.localeCompare(a.title));
this.render(this.games);
}

}

const app=new App();

</script>

</body>
</html>
