<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TheGame</title>

<style>

/* =====================
   BASIS DESIGN
===================== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0f0f0f;
color:white;
font-family:Arial;
}

/* =====================
   HEADER
===================== */
.header{
background:#1a1a1a;
padding:15px;
text-align:center;
font-size:24px;
color:#ff6b6b;
}

/* =====================
   FILTER + SUCHE
===================== */
.controls{
text-align:center;
margin:20px;
}

.controls button{
margin:5px;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
background:#333;
color:white;
}

.controls button:hover{
background:#ff6b6b;
}

/* SUCHFELD */
#searchInput{
margin-top:10px;
padding:10px;
width:60%;
max-width:300px;
border-radius:5px;
border:none;
}

/* =====================
   SPIELE GRID
===================== */
.games-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

/* GAME KARTE */
.game-card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.game-image{
width:100%;
height:120px;
object-fit:cover;
border-radius:5px;
}

/* SPIEL BUTTON */
.play-btn{
margin-top:10px;
width:100%;
padding:10px;
background:#ff6b6b;
border:none;
color:white;
border-radius:5px;
}

/* =====================
   MODAL (SPIEL FENSTER)
===================== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}

.modal-content{
width:90%;
height:90%;
margin:auto;
margin-top:3%;
}

.close-btn{
position:absolute;
right:20px;
top:20px;
padding:10px;
background:red;
color:white;
border:none;
}

</style>
</head>

<body>

<!-- =====================
     HEADER
===================== -->
<div class="header">🎮 TheGame</div>

<!-- =====================
     FILTER + SUCHE
===================== -->
<div class="controls">

<!-- FILTER BUTTONS -->
<button onclick="filterGames('all')">Alle</button>
<button onclick="filterGames('racing')">Racing</button>
<button onclick="filterGames('action')">Action</button>
<button onclick="filterGames('puzzle')">Puzzle</button>
<button onclick="filterGames('skill')">Skill</button>

<br>

<!-- SUCHFELD -->
<input id="searchInput" oninput="searchGames()" placeholder="Spiel suchen...">

</div>

<!-- =====================
     SPIELE CONTAINER
===================== -->
<div id="gamesContainer" class="games-grid"></div>

<!-- =====================
     SPIEL MODAL
===================== -->
<div id="gameModal" class="modal">
<button id="closeGame" class="close-btn">X</button>
<div class="modal-content" id="gameDetail"></div>
</div>

<script>

// =====================
// SPIELE LISTE
// Hier fügst du neue Games hinzu
// =====================
const games = [

{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},

{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},

{title:"Thief Puzzle",category:"puzzle",url:"https://play.famobi.com/thief-puzzle",image:"https://via.placeholder.com/300x150"},

{title:"Higher or Lower",category:"skill",url:"https://cdn.htmlgames.com/HigherOrLower/",image:"https://www.denkspiele.com/uploaded/game/screenshot/higherorLower800480.webp"}

];

// =====================
// AKTUELLE KATEGORIE
// =====================
let currentCategory = "all";

// =====================
// SPIEL ÖFFNEN
// =====================
function openGame(url){

// iframe erstellen (Spiel laden)
document.getElementById("gameDetail").innerHTML =
`<iframe src="${url}" width="100%" height="100%"></iframe>`;

// Modal anzeigen
document.getElementById("gameModal").style.display = "block";
}

// =====================
// MODAL SCHLIESSEN
// =====================
document.getElementById("closeGame").onclick = () => {
document.getElementById("gameModal").style.display = "none";
document.getElementById("gameDetail").innerHTML = "";
};

// =====================
// SPIELE ANZEIGEN
// =====================
function renderGames(){

const container = document.getElementById("gamesContainer");

// Suchtext holen
const search = document.getElementById("searchInput").value.toLowerCase();

container.innerHTML = "";

// FILTERN + SUCHEN
const filtered = games.filter(game =>

// Kategorie prüfen
(currentCategory === "all" || game.category === currentCategory)

// Suche prüfen
&& game.title.toLowerCase().includes(search)

);

// SPIELE ERSTELLEN
filtered.forEach(game => {

const div = document.createElement("div");
div.className = "game-card";

// Inhalt
div.innerHTML = `
<img src="${game.image}" class="game-image">
<h3>${game.title}</h3>
<button class="play-btn">Spielen</button>
`;

// Klick → Spiel öffnen
div.onclick = () => openGame(game.url);

container.appendChild(div);

});

}

// =====================
// FILTER FUNKTION
// =====================
function filterGames(category){
currentCategory = category;
renderGames();
}

// =====================
// SUCH FUNKTION
// =====================
function searchGames(){
renderGames();
}

// =====================
// START BEIM LADEN
// =====================
document.addEventListener("DOMContentLoaded", renderGames);

</script>

</body>
</html>
