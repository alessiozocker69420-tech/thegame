<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheGame</title>

<style>

/* =====================
   BASIC
===================== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f0f0f;
color:white;
font-family:Arial;
}

/* =====================
   HEADER
===================== */
.header{
background:#1a1a1a;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#ff6b6b;
font-size:24px;
font-weight:bold;
}

/* =====================
   HERO
===================== */
.hero{
background:linear-gradient(135deg,#ff6b6b,#ff8787);
padding:40px;
text-align:center;
}

/* =====================
   MAIN
===================== */
.main-wrapper{
padding:20px;
max-width:1200px;
margin:auto;
}

/* =====================
   GRID
===================== */
.games-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* =====================
   GAME CARD
===================== */
.game-card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
border:1px solid #333;
cursor:pointer;
transition:0.3s;
}

.game-card:hover{
transform:translateY(-5px);
border-color:#ff6b6b;
}

/* =====================
   IMAGE
===================== */
.game-image{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

/* =====================
   BUTTON
===================== */
.play-btn{
margin-top:10px;
width:100%;
padding:10px;
background:#ff6b6b;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* =====================
   MODAL
===================== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

.modal-content{
width:90%;
height:90%;
margin:auto;
margin-top:2%;
position:relative;
}

.close-btn{
position:absolute;
right:10px;
top:10px;
background:red;
border:none;
color:white;
padding:10px;
cursor:pointer;
}

/* =====================
   CHATBOT
===================== */
.chat-container{
max-width:600px;
margin:40px auto;
background:#1a1a1a;
padding:20px;
border-radius:10px;
}

#chatBox{
height:200px;
overflow-y:auto;
border:1px solid #333;
padding:10px;
margin-bottom:10px;
}

#chatInput{
width:70%;
padding:10px;
}

</style>
</head>

<body>

<!-- =====================
     HEADER
===================== -->
<header class="header">
<div class="logo">🎮 TheGame</div>
</header>

<!-- =====================
     HERO
===================== -->
<section class="hero">
<h1>Willkommen zu TheGame</h1>
</section>

<!-- =====================
     SPIELE
===================== -->
<div class="main-wrapper">
<div id="gamesContainer" class="games-grid"></div>
</div>

<!-- =====================
     CHATBOT
===================== -->
<div class="chat-container">

<h2>🤖 Game Chatbot</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Schreib etwas...">
<button onclick="sendMessage()" class="play-btn">Senden</button>

</div>

<!-- =====================
     MODAL
===================== -->
<div id="gameModal" class="modal">
<div class="modal-content">
<button id="closeGame" class="close-btn">X</button>
<div id="gameDetail" style="width:100%;height:100%;"></div>
</div>
</div>

<script>

// =====================
// SPIELE LISTE
// =====================
const games = [

{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},

{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},

{title:"SpacePinball",category:"racing",url:"https://cdn.htmlgames.com/SpacePinball/",image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png?w=128"}

];

// =====================
// SPIEL STARTEN
// =====================
function openGame(url){
const modal = document.getElementById("gameModal");
const detail = document.getElementById("gameDetail");

detail.innerHTML = `<iframe src="${url}" width="100%" height="100%"></iframe>`;
modal.style.display = "block";
}

// =====================
// MODAL SCHLIESSEN
// =====================
document.getElementById("closeGame").onclick = () => {
document.getElementById("gameModal").style.display = "none";
document.getElementById("gameDetail").innerHTML = "";
};

// =====================
// SPIELE LADEN
// =====================
function loadGames(){
const container = document.getElementById("gamesContainer");
container.innerHTML = "";

games.forEach(game => {
const div = document.createElement("div");
div.className = "game-card";

div.innerHTML = `
<img src="${game.image}" class="game-image">
<h3>${game.title}</h3>
<button class="play-btn">Spielen</button>
`;

div.onclick = () => openGame(game.url);

container.appendChild(div);
});
}

document.addEventListener("DOMContentLoaded", loadGames);

// =====================
// EINFACHE KI CHATBOT
// =====================
function sendMessage(){

const input = document.getElementById("chatInput");
const chatBox = document.getElementById("chatBox");

const text = input.value.toLowerCase();

// USER
chatBox.innerHTML += `<p><b>Du:</b> ${text}</p>`;

// BOT LOGIK
let reply = "Das weiß ich nicht 😅";

if(text.includes("hallo")){
reply = "Hallo 👋 Willkommen bei TheGame!";
}

else if(text.includes("beliebtestes spiel")){
reply = "Das beliebteste Spiel ist Traffic Racer 2 🚗🔥";
}

else if(text.includes("wem gehört")){
reply = "Die Website gehört Alessio 😎";
}

else if(text.includes("nicht so beliebt")){
reply = "SpacePinball ist nicht so beliebt 😅";
}

// BOT
chatBox.innerHTML += `<p><b>Bot:</b> ${reply}</p>`;

// RESET
input.value = "";
chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
