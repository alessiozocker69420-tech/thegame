<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gaming Hub PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #020617, #000);
  color: white;
  text-align: center;
}

/* HEADER */
header {
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
  background: linear-gradient(90deg, #00ffcc, #22c55e);
  -webkit-background-clip: text;
  color: transparent;
}

/* BUTTONS */
.controls {
  margin: 20px;
}

.btn {
  margin: 5px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #111;
  color: #00ffcc;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 0 10px #00ffcc44;
}

.btn:hover {
  background: #00ffcc;
  color: black;
  transform: scale(1.1);
}

/* GAMES GRID */
#games {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

/* GAME CARD */
.game {
  width: 200px;
  margin: 15px;
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px #000;
}

.game:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffcc;
}

.game img {
  width: 100%;
}

.game h3 {
  padding: 10px;
}

/* PLAYER */
#player {
  margin: 20px auto;
  width: 90%;
  height: 500px;
  display: none;
  border: 2px solid #00ffcc;
  border-radius: 15px;
  box-shadow: 0 0 20px #00ffcc;
}

/* MYINSTANTS WINDOW */
#instantsBox {
  display: none;
  position: fixed;
  top: 5%;
  left: 5%;
  width: 90%;
  height: 85%;
  background: #000;
  border: 2px solid #00ffcc;
  border-radius: 15px;
  box-shadow: 0 0 30px #00ffcc;
  z-index: 999;
}

#instantsFrame {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 15px;
}

.closeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  font-weight: bold;
}
</style>

</head>
<body>

<header>🎮 GAMING HUB PRO</header>

<div class="controls">

  <!-- FILTER -->
  <button class="btn" onclick="filterGames('all')">Alle</button>
  <button class="btn" onclick="filterGames('racing')">Racing</button>
  <button class="btn" onclick="filterGames('action')">Action</button>

  <!-- EXTRA -->
  <button class="btn" onclick="openChatGPT()">🤖 ChatGPT</button>
  <button class="btn" onclick="openSounds()">🔊 Sounds</button>

</div>

<!-- GAME PLAYER -->
<iframe id="player"></iframe>

<!-- MYINSTANTS -->
<div id="instantsBox">
  <button class="closeBtn" onclick="closeInstants()">❌</button>
  <iframe id="instantsFrame" src="https://www.myinstants.com"></iframe>
</div>

<!-- GAMES -->
<div id="games"></div>

<script>

// 🤖 ChatGPT
function openChatGPT() {
  window.open("https://chat.openai.com", "_blank");
}

// 🔊 MyInstants öffnen
function openSounds() {
  document.getElementById("instantsBox").style.display = "block";
}

// ❌ schließen
function closeInstants() {
  document.getElementById("instantsBox").style.display = "none";
}

// 🎮 SPIELE
const games = [

{title:"Ultimate Car Driving Simulator",category:"racing",url:"https://www.madkidgames.com/full/ultimate-car-driving-simulator",image:"https://via.placeholder.com/200"},
{title:"Airport Sniper",category:"action",url:"https://cdn.htmlgames.com/AirportSniper/",image:"https://cdn.spiele-kostenlos-online.de/wp-content/uploads/airport-sniper-01-160x110.webp"},
{title:"Traffic Racer 2",category:"racing",url:"https://cdn.htmlgames.com/TrafficRacer2/",image:"https://www.aktionspiele.de/uploaded/game/screenshot/trafficracer2800480.webp"},
{title:"Space Pinball",category:"racing",url:"https://cdn.htmlgames.com/SpacePinball/",image:"https://cdn.aptoide.com/imgs/1/b/1/1b1fa0c0dad30873323f0b001fc6e68e_icon.png"},
{title:"Higher or Lower",category:"racing",url:"https://cdn.htmlgames.com/HigherOrLower/",image:"https://www.denkspiele.com/uploaded/game/screenshot/higherorLower800480.webp"},
{title:"City Sniper",category:"action",url:"https://cdn.htmlgames.com/CitySniper/",image:"https://www.sellmyapp.com/wp-content/uploads/featured_image63417aad1a69e.png"},
{title:"Thief Puzzle",category:"action",url:"https://play.famobi.com/thief-puzzle",image:"https://via.placeholder.com/200"},
{title:"Geometry Dash",category:"racing",url:"https://gdbrowser.com",image:"https://via.placeholder.com/200"},
{title:"Galaxy Shooter",category:"action",url:"https://cdn.htmlgames.com/GalaxyShooter/",image:"https://via.placeholder.com/200"}

];

// anzeigen
const container = document.getElementById("games");

function displayGames(list) {
  container.innerHTML = "";

  list.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <img src="${game.image}">
      <h3>${game.title}</h3>
    `;

    div.onclick = () => {
      const player = document.getElementById("player");
      player.style.display = "block";
      player.src = game.url;
      window.scrollTo(0,0);
    };

    container.appendChild(div);
  });
}

// FILTER
function filterGames(cat) {
  if (cat === "all") return displayGames(games);
  displayGames(games.filter(g => g.category === cat));
}

// START
displayGames(games);

</script>

</body>
</html>
